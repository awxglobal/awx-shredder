# fly.toml — AWX Shredder on Fly.io
# Deploy with: flyctl deploy
# Set secrets first: see README § Deployment

app = "awx-shredder"
primary_region = "ams"   # Amsterdam — closest to your Supabase eu-west-1

[build]

[http_service]
  internal_port       = 3000
  force_https         = true
  auto_stop_machines  = "stop"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type       = "connections"
    hard_limit = 250
    soft_limit = 200

[[vm]]
  size   = "shared-cpu-1x"
  memory = "256mb"

[env]
  PORT     = "3000"
  NODE_ENV = "production"
